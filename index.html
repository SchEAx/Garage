    function formatDateTime(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("tr-TR");
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return new Intl.NumberFormat("tr-TR", {
        style: "currency",
        currency: "TRY",
        maximumFractionDigits: 2,
      }).format(num);
    }

    function safeParseJson(value, fallback = {}) {
      try {
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function recordTotal(record) {
      return (record.operations || []).reduce((sum, op) => sum + Number(op.fee || 0), 0);
    }
    function grandTotal(records) {
  return (records || []).reduce((sum, record) => sum + recordTotal(record), 0);
}

    function mapDbRow(r) {
      const meta = safeParseJson(r.notes, {});

    async function dbFetchRecords({ offset = 0, limit = PAGE_SIZE, search = "", status = "Tümü" } = {}) {
      const params = new URLSearchParams();
      params.set("select", "*");
      params.set("order", "id.desc");

      if (status && status !== "Tümü") {
        params.set("status", `eq.${status}`);
      }

      const trimmed = (search || "").trim();
      if (trimmed) {
        const safe = trimmed.replace(/,/g, " ").replace(/\*/g, "");
        params.set(
          "or",
          `record_no.ilike.*${safe}*,customer_name.ilike.*${safe}*,phone.ilike.*${safe}*,brand.ilike.*${safe}*,model.ilike.*${safe}*,issue.ilike.*${safe}*,notes.ilike.*${safe}*`
        );
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?${params.toString()}`, {
        headers: apiHeaders({
          Range: `${offset}-${offset + limit - 1}`,
          Prefer: "count=exact"
        }),
      });

      if (!res.ok) throw new Error("Kayıtlar alınamadı");
      const data = await res.json();
      const rangeHeader = res.headers.get("content-range") || "0-0/0";
      const totalPart = rangeHeader.split("/")[1] || "0";
      const total = Number(totalPart) || 0;
      return { data, total };
    }

    function formToPayload(form, existingRecordNo = null) {
  const cleanedOperations = (form.operations || []).filter(
    op => op.name && op.name.trim() && op.fee !== ""
  );

  const meta = {
    invoiceAddress: form.invoiceAddress,
    operations: cleanedOperations,
    vehicleImage: form.vehicleImage,
    noteText: form.noteText,
    technician: form.technician,
    vehicleDefects: form.vehicleDefects,
    signature: form.signature,
    plaka: form.plaka,
    sasiNo: form.sasiNo,
    kvkkOnay: form.kvkkOnay,
    musteriOnay: form.musteriOnay,
    isletmeOnay: form.isletmeOnay,
  };

  return {
    record_no: existingRecordNo || `SRV-${Date.now().toString().slice(-6)}`,
    customer_name: form.customerName,
    phone: form.phone,
    address: form.invoiceAddress || "",
    device_type: cleanedOperations.map(op => op.name).join(", "),
    brand: form.brand,
    model: form.model,
    issue: cleanedOperations.map(op => op.name).join(", "),
    notes: JSON.stringify(meta),
    receiver: "",
    status: form.status,
    signature: form.signature || "",
  };
}

    async function dbInsertRecord(form) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/records`, {
        method: "POST",
        headers: apiHeaders({
          "Content-Type": "application/json",
          Prefer: "return=representation",
        }),
        body: JSON.stringify(formToPayload(form)),
      });
      if (!res.ok) throw new Error("Kayıt eklenemedi");
      return await res.json();
    }

    async function dbUpdateRecord(id, form, existingRecordNo) {
      const payload = formToPayload(form, existingRecordNo);
      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
        method: "PATCH",
        headers: apiHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({
          record_no: payload.record_no,
          customer_name: payload.customer_name,
          phone: payload.phone,
          address: payload.address,
          device_type: (form.operations || []).map(op => op.name).join(", "),
          brand: payload.brand,
          model: payload.model,
         issue: (form.operations || []).map(op => op.name).join(", "),
          notes: payload.notes,
          status: payload.status,
          signature: payload.signature
        }),
      });
      if (!res.ok) throw new Error("Kayıt güncellenemedi");
    }

    async function dbUpdateStatus(id, status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
        method: "PATCH",
        headers: apiHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ status }),
      });
      if (!res.ok) throw new Error("Durum güncellenemedi");
    }

    async function dbUpdateMeta(id, currentRecord, patchMeta) {
      const existingMeta = {
        invoiceAddress: currentRecord.invoiceAddress || "",
        operations: (currentRecord.operations || []).map((op) => op.name),
        operationFees: Object.fromEntries((currentRecord.operations || []).map((op) => [op.name, op.fee || ""])),
        vehicleImage: currentRecord.vehicleImage || "",
        noteText: currentRecord.noteText || "",
        technician: currentRecord.technician || "",
        vehicleDefects: currentRecord.vehicleDefects || "",
        signature: currentRecord.signature || "",
      };

      const nextMeta = { ...existingMeta, ...patchMeta };

      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
        method: "PATCH",
        headers: apiHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({
          notes: JSON.stringify(nextMeta),
          signature: nextMeta.signature || ""
        }),
      });
      if (!res.ok) throw new Error("Kayıt güncellenemedi");
    }

    async function dbDeleteRecord(id) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
        method: "DELETE",
        headers: apiHeaders(),
      });
      if (!res.ok) throw new Error("Kayıt silinemedi");
    }

        state.records = data.map(mapDbRow);
        state.totalRemoteCount = total;
      } finally {

    }

    function resizeImage(file, maxWidth = 1280, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

async function saveRecord() {
  const form = state.form;

  const validOperations = (form.operations || []).filter(
    op => op.name && op.name.trim() && op.fee !== ""
  );

  if (!form.customerName || !form.phone || !form.brand || !form.model || !validOperations.length) {
    alert("Zorunlu alanlar: Müşteri Ad-Soyadı, Telefon, Araç Marka, Araç Modeli, En az 1 işlem ve ücret.");
    return;
  }

  if (!form.kvkkOnay || !form.musteriOnay || !form.isletmeOnay) {
    alert("Lütfen tüm onay kutularını işaretleyin!");
    return;
  }

  const payloadForm = {
    ...form,
    operations: validOperations
  };

  try {
    await dbInsertRecord(payloadForm);
    state.form = emptyForm();
    state.editId = null;
    state.activeTab = "liste";
    signatureHandlersBound = false;
    state.visibleCount = PAGE_SIZE;
    await loadRecordsFromDb();
  } catch (e) {
    alert("Kayıt veritabanına eklenemedi");
    console.error(e);
  }
}

    function downloadFile(filename, content, type = "application/json") {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile("musteri-kayitlari.json", JSON.stringify(state.records, null, 2));

    function toCsv(rows) {
      const headers = [
        "Kayıt No", "Kayıt Tarihi", "Müşteri", "Telefon", "Fatura Adresi", "Araç Marka", "Araç Modeli",
        "Yapılacak İşlemler", "İşlem Ücretleri", "Toplam Tutar", "Araçta Görülen Kusurlar", "Usta", "Durum", "Ek Notlar"
      ];

      const escapeCsv = (v) => {
        const value = String(v ?? "");
        if (value.includes(",") || value.includes("\n") || value.includes('"')) {
          return '"' + value.replace(/"/g, '""') + '"';
        }
        return value;
      };

      const lines = rows.map((r) => {
        const feeText = (r.operations || []).map((op) => `${op.name}: ${op.fee || 0}`).join(" | ");
        return [
          r.recordNo,
          formatDateTime(r.createdAt),
          r.customerName,
          r.phone,
          r.invoiceAddress || "",
          r.brand,
          r.model,
          (r.operations || []).map((op) => op.name).join(", "),
          feeText,
          recordTotal(r),
          r.vehicleDefects || "",
          r.technician || "",
          r.status || "",
          r.noteText || ""
        ].map(escapeCsv).join(",");
      });

      return [headers.join(","), ...lines].join("\n");
    }

    function exportCsv() {
      downloadFile("musteri-kayitlari.csv", toCsv(state.records), "text/csv;charset=utf-8;");
    }

    function render() {

    function setupSignaturePad() {
      if (state.activeTab !== "kayit") return;
      const canvas = document.getElementById("signaturePad");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      let drawing = false;

      function repaint() {
        ctx.fillStyle = "#09090b";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (state.form.signature) {
          const img = new Image();
          img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          img.src = state.form.signature;
        }
      }

      repaint();

      if (signatureHandlersBound && canvas.dataset.bound === "1") return;

      const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const point = e.touches ? e.touches[0] : e;
        return { x: point.clientX - rect.left, y: point.clientY - rect.top };
      };

      const start = (e) => {
        drawing = true;
        const { x, y } = getPos(e);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#ffffff";
      };

      const move = (e) => {
        if (!drawing) return;
        if (e.cancelable) e.preventDefault();
        const { x, y } = getPos(e);
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const end = () => {
        if (!drawing) return;
        drawing = false;
        state.form.signature = canvas.toDataURL("image/png");
      };

      canvas.onmousedown = start;
      canvas.onmousemove = move;
      canvas.onmouseup = end;
      canvas.onmouseleave = end;
      canvas.ontouchstart = start;
      canvas.ontouchmove = move;
      canvas.ontouchend = end;
      canvas.dataset.bound = "1";
      signatureHandlersBound = true;

      document.getElementById("clearSignature")?.addEventListener("click", () => {
        state.form.signature = "";
        repaint();
      });
    }

        });
      });
    }
