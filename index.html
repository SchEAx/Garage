<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garage App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #09090b; }
      canvas { touch-action: none; }
    </style>
    <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#09090b" />
<link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>

    <script>
      const SUPABASE_URL = "https://sltuupvattwfbidxlcej.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_Wkba-mO5gM2C7-QaqiXkqA_1rV1LzD0";

      function formatDateTime(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString("tr-TR");
      }

      function downloadFile(filename, content, type = "application/json") {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function toCsv(rows) {
        const headers = [
          "Kayıt No", "Kayıt Tarihi", "Müşteri", "Telefon", "Cihaz Türü", "Marka",
          "Model", "Şikayet", "Teslim Alan", "Durum"
        ];

        const escapeCsv = (v) => {
          const value = String(v ?? "");
          if (value.includes(",") || value.includes("\n") || value.includes('"')) {
            return '"' + value.replace(/"/g, '""') + '"';
          }
          return value;
        };

        const lines = rows.map((r) => [
          r.recordNo,
          formatDateTime(r.createdAt),
          r.customerName,
          r.phone,
          r.deviceType,
          r.brand,
          r.model,
          r.serialNo,
          r.issue,
          r.receiver,
          r.status,
        ].map(escapeCsv).join(","));

        return [headers.join(","), ...lines].join("\n");
      }

      function emptyForm() {
        return {
          customerName: "",
          phone: "",
          email: "",
          address: "",
          deviceType: "Telefon",
          brand: "",
          model: "",
          serialNo: "",
          accessories: "",
          issue: "",
          notes: "",
          receiver: "",
          status: "Kabul Edildi",
          signature: "",
        };
      }

      const state = {
        records: [],
        search: "",
        selectedId: null,
        tabletMode: false,
        statusFilter: "Tümü",
        activeTab: "kayit",
        loading: false,
        company: {
          name: "Servis Merkezim",
          phone: "0 (5__) ___ __ __",
          email: "info@firma.com",
          address: "Firma adresi buraya gelecek",
        },
        form: emptyForm(),
      };

      function apiHeaders(extra = {}) {
        return {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          ...extra,
        };
      }

      async function dbFetchRecords() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/records?select=*&order=id.desc`, {
          headers: apiHeaders(),
        });
        if (!res.ok) throw new Error("Kayıtlar alınamadı");
        return await res.json();
      }

      async function dbInsertRecord(record) {
        const payload = {
          record_no: record.recordNo,
          customer_name: record.customerName,
          phone: record.phone,
          email: record.email,
          address: record.address,
          device_type: record.deviceType,
          brand: record.brand,
          model: record.model,
          serial_no: record.serialNo,
          accessories: record.accessories,
          issue: record.issue,
          notes: record.notes,
          receiver: record.receiver,
          status: record.status,
          signature: record.signature,
        };

        const res = await fetch(`${SUPABASE_URL}/rest/v1/records`, {
          method: "POST",
          headers: apiHeaders({
            "Content-Type": "application/json",
            Prefer: "return=representation",
          }),
          body: JSON.stringify(payload),
        });

        if (!res.ok) throw new Error("Kayıt eklenemedi");
        return await res.json();
      }

      async function dbUpdateStatus(id, status) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
          method: "PATCH",
          headers: apiHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error("Durum güncellenemedi");
      }

      async function dbDeleteRecord(id) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/records?id=eq.${id}`, {
          method: "DELETE",
          headers: apiHeaders(),
        });
        if (!res.ok) throw new Error("Kayıt silinemedi");
      }

      async function loadRecordsFromDb() {
        state.loading = true;
        render();
        try {
          const rows = await dbFetchRecords();
          state.records = rows.map((r) => ({
            id: String(r.id),
            recordNo: r.record_no || "-",
            createdAt: r.created_at,
            customerName: r.customer_name || "",
            phone: r.phone || "",
            email: r.email || "",
            address: r.address || "",
            deviceType: r.device_type || "",
            brand: r.brand || "",
            model: r.model || "",
            serialNo: r.serial_no || "",
            accessories: r.accessories || "",
            issue: r.issue || "",
            notes: r.notes || "",
            receiver: r.receiver || "",
            status: r.status || "",
            signature: r.signature || "",
          }));
        } finally {
          state.loading = false;
          render();
        }
      }

      function filteredRecords() {
        const q = state.search.toLowerCase().trim();
        return state.records.filter((r) => {
          const matchesSearch = !q || [
            r.recordNo, r.customerName, r.phone, r.brand, r.model, r.serialNo, r.status,
          ].join(" ").toLowerCase().includes(q);

          const matchesStatus = state.statusFilter === "Tümü" || r.status === state.statusFilter;
          return matchesSearch && matchesStatus;
        });
      }

      function selectedRecord() {
        if (!state.selectedId) return null;
        return state.records.find((r) => r.id === state.selectedId) || null;
      }

      function stats() {
        return {
          total: state.records.length,
          pending: state.records.filter((r) => r.status === "Kabul Edildi").length,
          service: state.records.filter((r) => r.status === "Serviste").length,
          completed: state.records.filter((r) => r.status === "Teslime Hazır").length,
        };
      }

      function updateForm(key, value) {
        state.form[key] = value;
      }

      function updateCompany(key, value) {
        state.company[key] = value;
      }

      async function saveRecord() {
        const form = state.form;
        if (!form.customerName || !form.phone || !form.deviceType || !form.issue) {
          alert("Lütfen müşteri adı, telefon, cihaz türü ve şikayet alanlarını doldur.");
          return;
        }

        const record = {
          recordNo: `SRV-${Date.now().toString().slice(-6)}`,
          customerName: form.customerName,
          phone: form.phone,
          email: form.email,
          address: form.address,
          deviceType: form.deviceType,
          brand: form.brand,
          model: form.model,
          serialNo: form.serialNo,
          accessories: form.accessories,
          issue: form.issue,
          notes: form.notes,
          receiver: form.receiver,
          status: form.status,
          signature: form.signature,
        };

        try {
          await dbInsertRecord(record);
          state.form = emptyForm();
          state.activeTab = "liste";
          await loadRecordsFromDb();
        } catch (e) {
          alert("Kayıt veritabanına eklenemedi");
          console.error(e);
        }
      }

      async function deleteRecord(id) {
        try {
          await dbDeleteRecord(id);
          if (state.selectedId === id) state.selectedId = null;
          await loadRecordsFromDb();
        } catch (e) {
          alert("Kayıt silinemedi");
          console.error(e);
        }
      }

      async function updateRecordStatus(id, status) {
        try {
          await dbUpdateStatus(id, status);
          await loadRecordsFromDb();
        } catch (e) {
          alert("Durum güncellenemedi");
          console.error(e);
        }
      }

      function duplicateRecordToForm(id) {
        const record = state.records.find((r) => r.id === id);
        if (!record) return;

        state.form = {
          customerName: record.customerName || "",
          phone: record.phone || "",
          email: record.email || "",
          address: record.address || "",
          deviceType: record.deviceType || "Telefon",
          brand: record.brand || "",
          model: record.model || "",
          serialNo: record.serialNo || "",
          accessories: record.accessories || "",
          issue: record.issue || "",
          notes: record.notes || "",
          receiver: record.receiver || "",
          status: record.status || "Kabul Edildi",
          signature: record.signature || "",
        };

        state.activeTab = "kayit";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function exportJson() {
        downloadFile("musteri-kayitlari.json", JSON.stringify(state.records, null, 2));
      }

      function exportCsv() {
        downloadFile("musteri-kayitlari.csv", toCsv(state.records), "text/csv;charset=utf-8;");
      }

      function printReceipt(id) {
        const record = state.records.find((r) => r.id === id);
        if (!record) return;

        const win = window.open("", "_blank", "width=900,height=1200");
        if (!win) return;

        win.document.write(`
          <html>
            <head>
              <title>Servis Fişi - ${record.recordNo}</title>
              <style>
                body { font-family: Arial, sans-serif; padding: 32px; color: #111; }
                .box { border: 1px solid #ccc; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
                h1,h2,h3,p { margin: 0 0 10px 0; }
                .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
                .label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
                .value { font-size: 14px; font-weight: 600; }
                img { max-width: 100%; border: 1px solid #ddd; border-radius: 10px; }
              </style>
            </head>
            <body>
              <div class="box">
                <h1>${state.company.name}</h1>
                <p>${state.company.phone} · ${state.company.email}</p>
                <p>${state.company.address}</p>
              </div>
              <div class="box">
                <h2>Servis Kabul Fişi</h2>
                <p><strong>Kayıt No:</strong> ${record.recordNo}</p>
                <p><strong>Tarih:</strong> ${formatDateTime(record.createdAt)}</p>
                <p><strong>Durum:</strong> ${record.status}</p>
              </div>
              <div class="grid">
                <div class="box">
                  <h3>Müşteri Bilgileri</h3>
                  <div class="label">Ad Soyad</div><div class="value">${record.customerName || "-"}</div>
                  <div class="label">Telefon</div><div class="value">${record.phone || "-"}</div>
                  <div class="label">E-posta</div><div class="value">${record.email || "-"}</div>
                  <div class="label">Adres</div><div class="value">${record.address || "-"}</div>
                </div>
                <div class="box">
                  <h3>Cihaz Bilgileri</h3>
                  <div class="label">Cihaz Türü</div><div class="value">${record.deviceType || "-"}</div>
                  <div class="label">Marka / Model</div><div class="value">${record.brand || "-"} ${record.model || ""}</div>
                  <div class="label">Aksesuarlar</div><div class="value">${record.accessories || "-"}</div>
                </div>
              </div>
              <div class="box"><h3>Arıza / Şikayet</h3><p>${record.issue || "-"}</p></div>
              <div class="box"><h3>Servis Notu</h3><p>${record.notes || "-"}</p></div>
              <div class="box">
                <h3>Müşteri İmzası</h3>
                ${record.signature ? `<img src="${record.signature}" alt="İmza" />` : "<p>İmza alınmadı.</p>"}
              </div>
            </body>
          </html>
        `);
        win.document.close();
        setTimeout(() => win.print(), 300);
      }

      function render() {
        const app = document.getElementById("app");
        const s = stats();
        const rows = filteredRecords();
        const selected = selectedRecord();
        const showModal = !!state.selectedId && !!selected;

        const tabs = state.tabletMode
          ? [{ key: "kayit", label: "Yeni Kayıt" }, { key: "liste", label: "Kayıtlar" }]
          : [{ key: "kayit", label: "Yeni Kayıt" }, { key: "liste", label: "Kayıtlar" }, { key: "kurulum", label: "Sonraki Adım" }];

        app.innerHTML = `
          <div class="min-h-screen bg-zinc-950 text-white">
            <div class="${state.tabletMode ? "max-w-3xl" : "max-w-7xl"} mx-auto p-4 md:p-8">
              <div class="mb-8 grid gap-4 lg:grid-cols-[1.3fr_0.7fr]">
                <div class="rounded-3xl border border-white/10 bg-gradient-to-br from-zinc-900 to-black p-6 shadow-2xl">
                  <div class="flex items-start justify-between gap-3">
                    <div class="flex items-center gap-3">
                      <div class="rounded-2xl border border-white/10 bg-white/5 p-3">📋</div>
                      <div>
                        <h1 class="text-2xl font-bold tracking-tight">${state.company.name}</h1>
                        <p class="text-sm text-zinc-400">Müşteri Kabul Sistemi · veritabanlı sürüm</p>
                      </div>
                    </div>
                    <button id="toggleTablet" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition bg-zinc-800 text-white hover:bg-zinc-700">
                      ${state.tabletMode ? "🖥️ Panel Modu" : "📱 Tablet Modu"}
                    </button>
                  </div>
                  <div class="mt-6 flex flex-wrap gap-2">
                    <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">Karanlık Tema</span>
                    <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">Tablet Uyumlu</span>
                    <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">Bulut Kayıt</span>
                    <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">Servis Fişi Yazdırma</span>
                  </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                  ${[
                    { label: "Toplam Kayıt", value: s.total, icon: "📄" },
                    { label: "Yeni Kabul", value: s.pending, icon: "🙍" },
                    { label: "Serviste", value: s.service, icon: "🔧" },
                    { label: "Teslime Hazır", value: s.completed, icon: "✅" },
                  ].map((item) => `
                    <div class="rounded-3xl border border-white/10 bg-zinc-900/80 text-white">
                      <div class="p-5">
                        <div class="mb-3 flex items-center justify-between">
                          <span>${item.icon}</span>
                          <span class="text-xs text-zinc-500">Canlı</span>
                        </div>
                        <div class="text-2xl font-bold">${item.value}</div>
                        <div class="text-sm text-zinc-400">${item.label}</div>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>

              ${state.loading ? `<div class="mb-4 rounded-2xl border border-white/10 bg-zinc-900/90 p-4 text-sm text-zinc-300">Veriler yükleniyor...</div>` : ""}

              ${!state.tabletMode ? `
                <div class="mb-4 rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                  <div class="p-6 pb-3"><h2 class="text-lg font-semibold">Firma Bilgileri</h2></div>
                  <div class="grid gap-4 p-6 pt-0 md:grid-cols-2 xl:grid-cols-4">
                    <input data-company="name" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" value="${state.company.name}" />
                    <input data-company="phone" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" value="${state.company.phone}" />
                    <input data-company="email" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" value="${state.company.email}" />
                    <input data-company="address" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" value="${state.company.address}" />
                  </div>
                </div>
              ` : ""}

              <div class="mb-4 grid w-full gap-2 rounded-2xl bg-zinc-900 p-1" style="grid-template-columns: repeat(${tabs.length}, minmax(0, 1fr));">
                ${tabs.map((tab) => `
                  <button data-tab="${tab.key}" class="rounded-2xl px-4 py-2 text-sm font-medium transition ${state.activeTab === tab.key ? "bg-white text-black" : "text-white hover:bg-white/5"}">
                    ${tab.label}
                  </button>
                `).join("")}
              </div>

              ${state.activeTab === "kayit" ? `
                <div class="grid gap-4 xl:grid-cols-[1.15fr_0.85fr]">
                  <div class="rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                    <div class="p-6 pb-3"><h2 class="text-lg font-semibold">Servis Kabul Formu</h2></div>
                    <div class="grid gap-4 p-6 pt-0 md:grid-cols-2">
                      ${[
                        ["customerName", "Müşteri Adı Soyadı"],
                        ["phone", "Telefon"],
                        ["email", "E-posta"],
                        ["receiver", "Teslim Alan Personel"],
                        ["deviceType", "Cihaz Türü"],
                        ["status", "Durum"],
                        ["brand", "Marka"],
                        ["model", "Model"],
                      ].map(([k, label]) => `
                        <div class="space-y-2 ${k === "serialNo" ? "md:col-span-2" : ""}">
                          <label class="text-sm text-zinc-300">${label}</label>
                          <input data-form="${k}" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" value="${state.form[k] || ""}" />
                        </div>
                      `).join("")}
                      <div class="space-y-2 md:col-span-2"><label class="text-sm text-zinc-300">Adres</label><textarea data-form="address" class="min-h-[90px] w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white">${state.form.address || ""}</textarea></div>
                      <div class="space-y-2 md:col-span-2"><label class="text-sm text-zinc-300">Beraber Gelen Ekipmanlar</label><textarea data-form="accessories" class="min-h-[90px] w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white">${state.form.accessories || ""}</textarea></div>
                      <div class="space-y-2 md:col-span-2"><label class="text-sm text-zinc-300">Müşteri Şikayeti / Arıza Açıklaması</label><textarea data-form="issue" class="min-h-[110px] w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white">${state.form.issue || ""}</textarea></div>
                      <div class="space-y-2 md:col-span-2"><label class="text-sm text-zinc-300">Servis Notu</label><textarea data-form="notes" class="min-h-[90px] w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white">${state.form.notes || ""}</textarea></div>
                    </div>
                  </div>

                  <div class="space-y-4">
                    <div class="rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                      <div class="p-6 pb-3"><h2 class="text-lg font-semibold">✍️ Müşteri İmzası</h2></div>
                      <div class="p-6 pt-0">
                        <div class="space-y-3">
                          <div class="rounded-2xl border border-white/10 bg-black/50 p-2">
                            <canvas id="signaturePad" width="700" height="220" class="w-full rounded-xl bg-zinc-950"></canvas>
                          </div>
                          <div class="flex justify-end">
                            <button id="clearSignature" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition bg-zinc-800 text-white hover:bg-zinc-700">İmzayı Temizle</button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                      <div class="p-6 pb-3"><h2 class="text-lg font-semibold">Hızlı İşlemler</h2></div>
                      <div class="grid gap-3 p-6 pt-0 sm:grid-cols-2">
                        <button id="saveRecord" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition bg-white text-black hover:bg-zinc-200">💾 Kaydı Oluştur</button>
                        <button id="exportCsv" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition bg-zinc-800 text-white hover:bg-zinc-700">⬇️ CSV İndir</button>
                        <button id="exportJson" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition bg-zinc-800 text-white hover:bg-zinc-700">⬇️ JSON İndir</button>
                        <button id="resetForm" class="inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2 text-sm font-medium transition border border-white/10 bg-transparent text-white hover:bg-white/5">Formu Sıfırla</button>
                      </div>
                    </div>
                  </div>
                </div>
              ` : ""}

              ${state.activeTab === "liste" ? `
                <div class="rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                  <div class="p-6 pb-3">
                    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                      <h2 class="text-lg font-semibold">Kayıt Listesi</h2>
                      <div class="flex w-full flex-col gap-3 md:max-w-2xl md:flex-row">
                        <input id="search" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" placeholder="Kayıt no, müşteri, telefon, model..." value="${state.search}" />
                        <input id="statusFilter" class="w-full rounded-2xl border border-white/10 bg-zinc-950 px-3 py-2 text-sm text-white" placeholder="Tümü / Kabul Edildi / Serviste / Teslime Hazır" value="${state.statusFilter}" />
                      </div>
                    </div>
                  </div>
                  <div class="grid gap-3 p-6 pt-0">
                    ${rows.length === 0 ? `
                      <div class="rounded-2xl border border-dashed border-white/10 bg-black/20 p-10 text-center text-zinc-400">Henüz kayıt yok.</div>
                    ` : rows.map((record) => `
                      <div class="rounded-2xl border border-white/10 bg-black/30 p-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                          <div class="space-y-1">
                            <div class="flex flex-wrap items-center gap-2">
                              <span class="text-lg font-semibold">${record.customerName}</span>
                              <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">${record.recordNo}</span>
                              <span class="inline-flex rounded-xl bg-white/10 px-3 py-1 text-xs text-white">${record.status}</span>
                            </div>
                            <div class="text-sm text-zinc-400">${record.phone} · ${record.deviceType} · ${record.brand} ${record.model}</div>
                            <div class="text-sm text-zinc-500">Kayıt: ${formatDateTime(record.createdAt)}</div>
                          </div>
                          <div class="flex flex-wrap gap-2">
                            <button data-status="Kabul Edildi" data-id="${record.id}" class="rounded-2xl border border-white/10 bg-transparent px-4 py-2 text-sm text-white hover:bg-white/5">Kabul</button>
                            <button data-status="Serviste" data-id="${record.id}" class="rounded-2xl border border-white/10 bg-transparent px-4 py-2 text-sm text-white hover:bg-white/5">Serviste</button>
                            <button data-status="Teslime Hazır" data-id="${record.id}" class="rounded-2xl border border-white/10 bg-transparent px-4 py-2 text-sm text-white hover:bg-white/5">Hazır</button>
                            <button data-detail="${record.id}" class="rounded-2xl bg-zinc-800 px-4 py-2 text-sm text-white hover:bg-zinc-700">Detay</button>
                            <button data-duplicate="${record.id}" class="rounded-2xl bg-zinc-800 px-4 py-2 text-sm text-white hover:bg-zinc-700">Forma Al</button>
                            <button data-print="${record.id}" class="rounded-2xl bg-zinc-800 px-4 py-2 text-sm text-white hover:bg-zinc-700">⬇️ Fiş</button>
                            <button data-delete="${record.id}" class="rounded-2xl bg-red-600 px-4 py-2 text-sm text-white hover:bg-red-500">🗑️ Sil</button>
                          </div>
                        </div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              ` : ""}

              ${state.activeTab === "kurulum" && !state.tabletMode ? `
                <div class="grid gap-4 lg:grid-cols-3">
                  <div class="lg:col-span-2 rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                    <div class="p-6 pb-3"><h2 class="text-lg font-semibold">Bu sürümde hazır olanlar</h2></div>
                    <div class="grid gap-3 p-6 pt-0 text-sm text-zinc-300">
                      <div class="rounded-2xl border border-white/10 bg-black/20 p-4">• Tablet ve PC aynı kayıtları görür</div>
                      <div class="rounded-2xl border border-white/10 bg-black/20 p-4">• Bulut veritabanı</div>
                      <div class="rounded-2xl border border-white/10 bg-black/20 p-4">• Arama ve detay görüntüleme</div>
                      <div class="rounded-2xl border border-white/10 bg-black/20 p-4">• CSV ve JSON dışa aktarma</div>
                    </div>
                  </div>
                  <div class="rounded-3xl border border-white/10 bg-zinc-900/90 text-white">
                    <div class="p-6 pb-3"><h2 class="text-lg font-semibold">Sıradaki adımlar</h2></div>
                    <div class="space-y-3 p-6 pt-0 text-sm text-zinc-300">
                      <div>🔐 Kullanıcı girişi</div>
                      <div>📩 Müşteri bilgilendirme</div>
                      <div>📄 Gelişmiş PDF fişi</div>
                      <div>👨‍🔧 Personel rolleri</div>
                    </div>
                  </div>
                </div>
              ` : ""}
            </div>
          </div>

          ${showModal ? `
            <div id="modalOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
              <div class="w-full max-w-3xl rounded-3xl border border-white/10 bg-zinc-950 text-white shadow-2xl">
                <div class="flex justify-end p-3"><button id="closeModal" class="rounded-2xl border border-white/10 bg-transparent px-4 py-2 text-sm text-white hover:bg-white/5">✕</button></div>
                <div class="px-6 pb-6 space-y-4">
                  <h2 class="text-lg font-semibold">${selected.customerName || "-"} · ${selected.recordNo || "-"}</h2>
                  <div class="grid gap-4 md:grid-cols-2">
                    <div>
                      <h3 class="mb-2 font-semibold">Müşteri Bilgileri</h3>
                      <div class="space-y-2 text-sm text-zinc-300">
                        <div><span class="text-zinc-500">Telefon:</span> ${selected.phone || "-"}</div>
                        <div><span class="text-zinc-500">E-posta:</span> ${selected.email || "-"}</div>
                        <div><span class="text-zinc-500">Adres:</span> ${selected.address || "-"}</div>
                        <div><span class="text-zinc-500">Teslim Alan:</span> ${selected.receiver || "-"}</div>
                      </div>
                    </div>
                    <div>
                      <h3 class="mb-2 font-semibold">Cihaz Bilgileri</h3>
                      <div class="space-y-2 text-sm text-zinc-300">
                        <div><span class="text-zinc-500">Tür:</span> ${selected.deviceType || "-"}</div>
                        <div><span class="text-zinc-500">Marka / Model:</span> ${selected.brand || "-"} ${selected.model || ""}</div>
                        <div><span class="text-zinc-500">Seri No:</span> ${selected.serialNo || "-"}</div>
                        <div><span class="text-zinc-500">Aksesuar:</span> ${selected.accessories || "-"}</div>
                      </div>
                    </div>
                  </div>
                  <div class="h-px w-full bg-white/10"></div>
                  <div class="space-y-3 text-sm text-zinc-300">
                    <div><div class="mb-1 font-semibold">Müşteri Şikayeti</div><div class="rounded-2xl border border-white/10 bg-black/30 p-3">${selected.issue || "-"}</div></div>
                    <div><div class="mb-1 font-semibold">Servis Notu</div><div class="rounded-2xl border border-white/10 bg-black/30 p-3">${selected.notes || "-"}</div></div>
                    <div>
                      <div class="mb-1 font-semibold">İmza</div>
                      ${selected.signature ? `<img src="${selected.signature}" class="rounded-2xl border border-white/10" />` : `<div class="rounded-2xl border border-dashed border-white/10 p-6 text-zinc-500">İmza yok</div>`}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          ` : ""}
        `;

        document.getElementById("toggleTablet")?.addEventListener("click", () => { state.tabletMode = !state.tabletMode; render(); });
        document.querySelectorAll("[data-tab]").forEach((btn) => btn.addEventListener("click", () => { state.activeTab = btn.dataset.tab; render(); }));
        document.querySelectorAll("[data-form]").forEach((el) => el.addEventListener("input", (e) => updateForm(el.dataset.form, e.target.value)));
        document.querySelectorAll("[data-company]").forEach((el) => el.addEventListener("input", (e) => updateCompany(el.dataset.company, e.target.value)));
        document.getElementById("saveRecord")?.addEventListener("click", saveRecord);
        document.getElementById("exportCsv")?.addEventListener("click", exportCsv);
        document.getElementById("exportJson")?.addEventListener("click", exportJson);
        document.getElementById("resetForm")?.addEventListener("click", () => { state.form = emptyForm(); render(); });
        document.getElementById("search")?.addEventListener("input", (e) => { state.search = e.target.value; });
        document.getElementById("statusFilter")?.addEventListener("input", (e) => { state.statusFilter = e.target.value; });
        document.querySelectorAll("[data-status]").forEach((btn) => btn.addEventListener("click", () => updateRecordStatus(btn.dataset.id, btn.dataset.status)));
        document.querySelectorAll("[data-detail]").forEach((btn) => btn.addEventListener("click", () => { state.selectedId = btn.dataset.detail || null; render(); }));
        document.querySelectorAll("[data-duplicate]").forEach((btn) => btn.addEventListener("click", () => duplicateRecordToForm(btn.dataset.duplicate)));
        document.querySelectorAll("[data-delete]").forEach((btn) => btn.addEventListener("click", () => deleteRecord(btn.dataset.delete)));
        document.querySelectorAll("[data-print]").forEach((btn) => btn.addEventListener("click", () => printReceipt(btn.dataset.print)));
        document.getElementById("closeModal")?.addEventListener("click", () => { state.selectedId = null; render(); });
        document.getElementById("modalOverlay")?.addEventListener("click", (e) => { if (e.target.id === "modalOverlay") { state.selectedId = null; render(); } });

        setupSignaturePad();
      }

      function setupSignaturePad() {
        const canvas = document.getElementById("signaturePad");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        let drawing = false;

        function repaint() {
          ctx.fillStyle = "#09090b";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          if (state.form.signature) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = state.form.signature;
          }
        }

        repaint();

        const getPos = (e) => {
          const rect = canvas.getBoundingClientRect();
          const point = e.touches ? e.touches[0] : e;
          return { x: point.clientX - rect.left, y: point.clientY - rect.top };
        };

        const start = (e) => {
          drawing = true;
          const { x, y } = getPos(e);
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineWidth = 2;
          ctx.lineCap = "round";
          ctx.strokeStyle = "#ffffff";
        };

        const move = (e) => {
          if (!drawing) return;
          if (e.cancelable) e.preventDefault();
          const { x, y } = getPos(e);
          ctx.lineTo(x, y);
          ctx.stroke();
        };

        const end = () => {
          if (!drawing) return;
          drawing = false;
          state.form.signature = canvas.toDataURL("image/png");
        };

        canvas.onmousedown = start;
        canvas.onmousemove = move;
        canvas.onmouseup = end;
        canvas.onmouseleave = end;
        canvas.ontouchstart = start;
        canvas.ontouchmove = move;
        canvas.ontouchend = end;

        document.getElementById("clearSignature")?.addEventListener("click", () => {
          state.form.signature = "";
          repaint();
        });
      }

      (async function init() {
        state.selectedId = null;
        await loadRecordsFromDb();
      })();
    </script>
    <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.error("Service worker kayıt hatası:", err);
      });
    });
  }
</script>
